<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打地鼠 — 文字的演變</title>
  <meta name="description" content="國中國文科「文字的演變」單元複習打地鼠遊戲">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap"
    rel="stylesheet">
  <style>
    /* ══════════════════════════════════════
   RESET & TOKENS
   ══════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d78c;
      --gold-dark: #8b6914;
      --red: #b5342a;
      --red-dark: #7a1e17;
      --parchment: #f5ead0;
      --parchment-d: #e8d5ab;
      --ink: #2c1e10;
      --bg-deep: #1a110a;
      --green: #3a7d44;
      --green-light: #5cb85c;
      --shadow: rgba(0, 0, 0, .35);
      --font-serif: 'Noto Serif TC', 'PMingLiU', serif;
      --font-brush: 'Ma Shan Zheng', cursive;
    }

    html,
    body {
      font-family: var(--font-serif);
      background: var(--bg-deep);
      color: var(--ink);
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* subtle texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(201, 168, 76, .1) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(181, 52, 42, .06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════════════
   TOP BAR — title + HUD in one row
   ══════════════════════════════════════ */
    #top-bar {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .35rem .8rem;
      gap: .6rem;
      background: linear-gradient(180deg, rgba(44, 30, 16, .9) 0%, rgba(26, 17, 10, .7) 100%);
      border-bottom: 1px solid var(--gold-dark);
      flex-shrink: 0;
    }

    #top-bar h1 {
      font-family: var(--font-brush);
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--gold-light);
      text-shadow: 0 1px 6px rgba(0, 0, 0, .5);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hud-group {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-shrink: 0;
    }

    .hud-item {
      display: flex;
      align-items: center;
      gap: .3rem;
      color: var(--parchment);
      font-size: clamp(.75rem, 2vw, .9rem);
    }

    .hud-item .lbl {
      color: var(--gold);
      font-weight: 700;
    }

    #hp-hearts .heart {
      display: inline-block;
      font-size: .9rem;
      transition: transform .3s, opacity .3s;
    }

    #hp-hearts .heart.lost {
      opacity: .15;
      transform: scale(.6);
    }

    #timer-bar-wrapper {
      flex: 1 1 0;
      min-width: 60px;
      height: 6px;
      background: rgba(255, 255, 255, .08);
      border-radius: 99px;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--green-light), var(--green));
      border-radius: 99px;
    }

    #timer-bar.warn {
      background: linear-gradient(90deg, #f0ad4e, #ec971f);
    }

    #timer-bar.danger {
      background: linear-gradient(90deg, var(--red), var(--red-dark));
    }

    /* ══════════════════════════════════════
   BOSS CARD — compact horizontal
   ══════════════════════════════════════ */
    #boss-area {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: .35rem .5rem;
      flex-shrink: 0;
    }

    #boss-card {
      background: linear-gradient(160deg, #3e2a14, #2a1a0c);
      border: 1.5px solid var(--gold);
      border-radius: 12px;
      padding: .4rem 1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(201, 168, 76, .12);
      max-width: 480px;
      width: 100%;
    }

    #boss-mole {
      font-size: 1.8rem;
      flex-shrink: 0;
      animation: boss-bounce 2s ease-in-out infinite;
    }

    @keyframes boss-bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    #boss-question-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .prompt-label {
      font-size: clamp(.65rem, 1.6vw, .75rem);
      color: var(--gold);
      letter-spacing: .1em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /*
 * 【替換說明】
 * 目前以大文字顯示。如要換成圖片，請將 innerHTML 改為：
 * <img src="你的圖片網址" alt="題目" style="max-height:52px;" />
 */
    #question-display {
      min-width: 60px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--parchment);
      border: 1.5px solid var(--gold-dark);
      border-radius: 8px;
      padding: .2rem .7rem;
      font-family: var(--font-brush);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--ink);
      box-shadow: inset 0 1px 6px rgba(0, 0, 0, .12);
      flex-shrink: 0;
    }

    .font-hint {
      font-size: .65rem;
      color: var(--parchment-d);
      opacity: .5;
      display: none;
      /* hidden to save space */
    }

    /* ══════════════════════════════════════
   MOLE GRID (3×3) — fills remaining space
   ══════════════════════════════════════ */
    #mole-grid-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: .2rem .5rem .4rem;
    }

    #mole-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(.2rem, .8vw, .4rem);
      width: 100%;
      max-width: min(520px, 80vh);
      height: 100%;
      max-height: 100%;
    }

    .mole-hole {
      position: relative;
      perspective: 600px;
      min-height: 0;
      overflow: hidden;
    }

    /* Ground ellipse */
    .mole-hole::after {
      content: '';
      position: absolute;
      bottom: 2%;
      left: 12%;
      width: 76%;
      height: 24%;
      background: radial-gradient(ellipse, #3d2b15, #2a1a0a 60%, transparent 100%);
      border-radius: 50%;
      z-index: 0;
    }

    .mole-btn {
      position: absolute;
      inset: 0;
      z-index: 1;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14%;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mole-body {
      width: 78%;
      max-width: 140px;
      background: linear-gradient(180deg, #b08040, #8b5e26 50%, #6b4418);
      border-radius: 44% 44% 10% 10%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6% 4% 10%;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .45), inset 0 2px 0 rgba(255, 220, 140, .2);
      transform: translateY(110%);
      transition: transform .28s cubic-bezier(.34, 1.56, .64, 1);
      gap: 2px;
    }

    .mole-hole.active .mole-body {
      transform: translateY(0);
    }

    .mole-eyes {
      font-size: clamp(.5rem, 1.4vw, .7rem);
      line-height: 1;
    }

    .mole-label {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: clamp(.6rem, 2vw, .95rem);
      color: var(--parchment);
      text-shadow: 0 1px 3px rgba(0, 0, 0, .6);
      letter-spacing: .05em;
      white-space: nowrap;
    }

    .mole-btn:hover .mole-body {
      box-shadow: 0 3px 16px rgba(201, 168, 76, .5), inset 0 2px 0 rgba(255, 220, 140, .3);
    }

    .mole-btn:active .mole-body {
      transform: translateY(0) scale(.9);
    }

    .mole-hole.hit-correct .mole-body {
      background: linear-gradient(180deg, var(--green-light), var(--green)) !important;
    }

    .mole-hole.hit-wrong .mole-body {
      background: linear-gradient(180deg, var(--red), var(--red-dark)) !important;
    }

    /* ══════════════════════════════════════
   OVERLAYS — Start / End Screen
   ══════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 6, 2, .9);
      backdrop-filter: blur(8px);
      color: var(--parchment);
      text-align: center;
      padding: 1.5rem;
      gap: .8rem;
    }

    .overlay h2 {
      font-family: var(--font-brush);
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--gold-light);
      text-shadow: 0 2px 12px rgba(201, 168, 76, .4);
    }

    .screen-desc {
      max-width: 380px;
      font-size: clamp(.8rem, 2.2vw, .95rem);
      line-height: 1.65;
      color: var(--parchment-d);
    }

    .screen-desc strong {
      color: var(--gold);
    }

    .btn-primary {
      margin-top: .4rem;
      padding: .65rem 2rem;
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(201, 168, 76, .4);
      transition: transform .2s, box-shadow .2s;
      letter-spacing: .08em;
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 24px rgba(201, 168, 76, .55);
    }

    .btn-primary:active {
      transform: scale(.95);
    }

    .final-score {
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      font-weight: 900;
      color: var(--gold-light);
      text-shadow: 0 3px 16px rgba(201, 168, 76, .4);
    }

    .final-label {
      font-size: .9rem;
      color: var(--parchment-d);
      letter-spacing: .2em;
    }

    .hidden {
      display: none !important;
    }

    /* ══════════════════════════════════════
   FLOATING FEEDBACK
   ══════════════════════════════════════ */
    .float-text {
      position: fixed;
      z-index: 200;
      font-family: var(--font-brush);
      font-size: 1.4rem;
      pointer-events: none;
      animation: float-up .85s ease-out forwards;
    }

    .float-text.correct {
      color: var(--green-light);
      text-shadow: 0 0 10px rgba(92, 184, 92, .6);
    }

    .float-text.wrong {
      color: var(--red);
      text-shadow: 0 0 10px rgba(181, 52, 42, .6);
    }

    @keyframes float-up {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(1.2);
      }
    }

    /* ══════════════════════════════════════
   CORNER ORNAMENTS
   ══════════════════════════════════════ */
    .corner-ornament {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 0;
      opacity: .15;
      pointer-events: none;
    }

    .corner-ornament svg {
      width: 100%;
      height: 100%;
    }

    .corner-tl {
      top: 0;
      left: 0;
    }

    .corner-tr {
      top: 0;
      right: 0;
      transform: scaleX(-1);
    }

    .corner-bl {
      bottom: 0;
      left: 0;
      transform: scaleY(-1);
    }

    .corner-br {
      bottom: 0;
      right: 0;
      transform: scale(-1);
    }

    /* ══════════════════════════════════════
   RWD
   ══════════════════════════════════════ */
    @media (max-width: 480px) {
      #top-bar h1 {
        font-size: .9rem;
      }

      #boss-card {
        padding: .3rem .6rem;
        gap: .5rem;
      }

      #boss-mole {
        font-size: 1.4rem;
      }

      #question-display {
        height: 42px;
        font-size: 1.3rem;
        min-width: 48px;
      }
    }

    @media (min-height: 800px) {
      #mole-grid {
        max-width: 540px;
      }

      #boss-card {
        padding: .6rem 1.2rem;
      }

      #boss-mole {
        font-size: 2.2rem;
      }

      #question-display {
        height: 62px;
        font-size: 2rem;
      }
    }

    @media (min-width: 768px) and (min-height: 600px) {
      .font-hint {
        display: block;
      }
    }

    /* ══════════════════════════════════════
       ADDITIONAL GAME STYLES (GOLDEN MOLE & OPTION BUTTONS)
       ══════════════════════════════════════ */
    .mole-hole.special-colored .mole-body {
      background: linear-gradient(180deg, #ffd700, #ff8c00 50%, #d48a00) !important;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), inset 0 2px 0 rgba(255, 255, 255, 0.4);
      animation: special-pulse 1.5s infinite alternate;
    }

    @keyframes special-pulse {
      0% {
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      }
      100% {
        box-shadow: 0 0 25px rgba(255, 215, 0, 1), 0 0 10px rgba(255, 140, 0, 0.5);
      }
    }

    #question-display img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .btn-option {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      background: linear-gradient(135deg, var(--parchment), var(--parchment-d));
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
      text-align: left;
    }

    .btn-option:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(201, 168, 76, 0.35);
    }

        .btn-option:active {
      transform: scale(0.98);
    }

    /* ══════════════════════════════════════
       EVALUATION SEAL
       ══════════════════════════════════════ */
    .rank-seal {
      width: 120px;
      height: 120px;
      border: 4px solid var(--red);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: var(--font-brush);
      color: var(--red);
      background: rgba(181, 52, 42, 0.06);
      box-shadow: 0 0 0 3px rgba(181, 52, 42, 0.15), 0 0 18px rgba(181, 52, 42, 0.1), inset 0 0 20px rgba(181, 52, 42, 0.06);
      position: relative;
      transform: rotate(-5deg);
      opacity: 0;
    }

    .rank-seal.animate {
      animation: seal-stamp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 seal-glow 2s ease-in-out 1s infinite;
    }

    @keyframes seal-stamp {
      0% {
        transform: rotate(-5deg) scale(3);
        opacity: 0;
        filter: blur(4px);
      }
      40% {
        transform: rotate(-5deg) scale(0.85);
        opacity: 1;
        filter: blur(0px);
      }
      55% {
        transform: rotate(-3deg) scale(1.12);
        opacity: 1;
      }
      70% {
        transform: rotate(-6deg) scale(0.97);
        opacity: 1;
      }
      85% {
        transform: rotate(-4deg) scale(1.03);
        opacity: 1;
      }
      100% {
        transform: rotate(-5deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes seal-glow {
      0%, 100% {
        box-shadow: 0 0 0 3px rgba(181, 52, 42, 0.15), 0 0 18px rgba(181, 52, 42, 0.1), inset 0 0 20px rgba(181, 52, 42, 0.06);
        border-color: var(--red);
      }
      50% {
        box-shadow: 0 0 0 5px rgba(181, 52, 42, 0.25), 0 0 30px rgba(181, 52, 42, 0.3), 0 0 60px rgba(181, 52, 42, 0.15), inset 0 0 25px rgba(181, 52, 42, 0.12);
        border-color: var(--red-dark);
      }
    }

    .rank-seal::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border: 2px dashed rgba(181, 52, 42, 0.3);
      border-radius: 50%;
    }

    .rank-seal-label {
      font-size: 0.75rem;
      letter-spacing: 3px;
      border-bottom: 1.5px solid var(--red);
      padding-bottom: 3px;
      margin-bottom: 4px;
    }

    .rank-seal-rank {
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .rank-seal-desc {
      font-family: var(--font-serif);
      font-size: 0.92rem;
      color: var(--parchment-d);
      margin-top: 10px;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
      max-width: 320px;
    }
  </style>
</head>

<body>

  <!-- Corner ornaments -->
  <div class="corner-ornament corner-tl"><svg viewBox="0 0 80 80">
      <path d="M0 0 L80 0 L80 8 L8 8 L8 80 L0 80 Z" fill="#c9a84c" />
      <path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="#8b6914" />
    </svg></div>
  <div class="corner-ornament corner-tr"><svg viewBox="0 0 80 80">
      <path d="M0 0 L80 0 L80 8 L8 8 L8 80 L0 80 Z" fill="#c9a84c" />
      <path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="#8b6914" />
    </svg></div>
  <div class="corner-ornament corner-bl"><svg viewBox="0 0 80 80">
      <path d="M0 0 L80 0 L80 8 L8 8 L8 80 L0 80 Z" fill="#c9a84c" />
      <path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="#8b6914" />
    </svg></div>
  <div class="corner-ornament corner-br"><svg viewBox="0 0 80 80">
      <path d="M0 0 L80 0 L80 8 L8 8 L8 80 L0 80 Z" fill="#c9a84c" />
      <path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="#8b6914" />
    </svg></div>

  <!-- ═══ TOP BAR (title + HUD in 1 row) ═══ -->
  <header id="top-bar">
    <div style="display: flex; align-items: center; gap: 10px;">
      <button onclick="window.location.href='./index.html'" style="padding: 4px 10px; background: rgba(255,255,255,0.12); color: var(--gold-light); border: 1.5px solid var(--gold-dark); border-radius: 4px; font-size: 0.82rem; font-family: var(--font-serif); font-weight: 700; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='var(--gold)'; this.style.color='var(--bg-deep)';" onmouseout="this.style.background='rgba(255,255,255,0.12)'; this.style.color='var(--gold-light)';">← 回到大地圖</button>
      <h1>📜 文字的演變</h1>
    </div>
    <div class="hud-group">
      <div class="hud-item"><span class="lbl">分</span><span id="score-val">0</span></div>
      <div class="hud-item"><span id="hp-hearts"></span></div>
    </div>
    <div id="timer-bar-wrapper">
      <div id="timer-bar"></div>
    </div>
  </header>

  <!-- ═══ BOSS MOLE ═══ -->
  <section id="boss-area">
    <div id="boss-card">
      <div id="boss-mole">🐹</div>
            <div id="boss-question-box">
        <span class="prompt-label">▼ 這是哪一種字體？</span>
        <div id="question-display">？</div>
      </div>
    </div>
  </section>

  <!-- ═══ MOLE GRID ═══ -->
  <section id="mole-grid-wrapper">
    <div id="mole-grid"></div>
  </section>

  <!-- ═══ START SCREEN ═══ -->
  <div id="start-screen" class="overlay">
    <h2>📜 文字的演變</h2>
    <p class="screen-desc">
      魔王大地鼠會亮出書法圖片，<br>
      請敲擊九宮格中<strong>正確的國字字卡</strong>！<br><br>
      ⏱ 速度隨分數增加而變快 <br>
      ❤️ 共 <strong>5 條命</strong><br>
      🎯 答對得分 +10 ~ +50 分，難度越高得分越多！<br>
      ✨ 擊中<strong>變色的黃金地鼠</strong>可觸發隨機試題！
    </p>
    <button class="btn-primary" id="btn-start">開始挑戰</button>
  </div>

    <!-- ═══ END SCREEN ═══ -->
  <div id="end-screen" class="overlay hidden">
    <h2>🏆 遊戲結束！</h2>
    <p class="final-label">最終得分</p>
    <p class="final-score" id="final-score-val">0</p>

    <!-- 評比印章 Rank Seal -->
    <div class="rank-seal-container" style="display: flex; flex-direction: column; align-items: center; margin: 0.5rem 0;">
      <div class="rank-seal" id="rank-seal-circle">
        <div class="rank-seal-label">書法技藝</div>
        <div class="rank-seal-rank" id="rank-seal-text">不入流</div>
      </div>
      <div class="rank-seal-desc" id="rank-seal-desc">評語載入中...</div>
    </div>

    <button class="btn-primary" id="btn-restart">再挑戰一次</button>
  </div>

  <!-- ★ RANDOM QUESTION OVERLAY ★ -->
  <div id="question-overlay" class="overlay hidden">
    <div class="scroll-card">
      <h2 id="q-overlay-title">🌟 隨機加分題 🌟</h2>
      <p id="q-overlay-question" class="screen-desc" style="font-weight: 700; font-size: 1.1rem; color: var(--gold-light); margin-bottom: 1rem;"></p>
      <div id="q-overlay-options" style="display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 320px;"></div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { id: 1,  fontType: '隸書',  displayChar: '學', displayAsset: '<img src="../書法字體圖片/圖片1.jpg" alt="隸書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 2,  fontType: '草書',  displayChar: '雲', displayAsset: '<img src="../書法字體圖片/圖片2.jpg" alt="草書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 3,  fontType: '小篆',  displayChar: '水', displayAsset: '<img src="../書法字體圖片/圖片3.png" alt="小篆" style="max-height:100%;object-fit:contain;"/>' },
      { id: 4,  fontType: '金文',  displayChar: '鼎', displayAsset: '<img src="../書法字體圖片/圖片4.png" alt="金文" style="max-height:100%;object-fit:contain;"/>' },
      { id: 5,  fontType: '行書',  displayChar: '書', displayAsset: '<img src="../書法字體圖片/圖片5.jpg" alt="行書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 6,  fontType: '甲骨文', displayChar: '日', displayAsset: '<img src="../書法字體圖片/圖片6.png" alt="甲骨文" style="max-height:100%;object-fit:contain;"/>' },
      { id: 7,  fontType: '草書',  displayChar: '風', displayAsset: '<img src="../書法字體圖片/圖片7.jpg" alt="草書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 8,  fontType: '大篆',  displayChar: '馬', displayAsset: '<img src="../書法字體圖片/圖片8.jpg" alt="大篆" style="max-height:100%;object-fit:contain;"/>' },
      { id: 9,  fontType: '楷書',  displayChar: '字', displayAsset: '<img src="../書法字體圖片/圖片9.jpg" alt="楷書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 10, fontType: '甲骨文', displayChar: '月', displayAsset: '<img src="../書法字體圖片/圖10.png"  alt="甲骨文" style="max-height:100%;object-fit:contain;"/>' },
      { id: 11, fontType: '小篆',  displayChar: '火', displayAsset: '<img src="../書法字體圖片/圖11.png"  alt="小篆" style="max-height:100%;object-fit:contain;"/>' },
      { id: 12, fontType: '隸書',  displayChar: '道', displayAsset: '<img src="../書法字體圖片/圖12.png"  alt="隸書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 13, fontType: '隸書',  displayChar: '飛', displayAsset: '<img src="../書法字體圖片/圖13.png"  alt="隸書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 14, fontType: '金文',  displayChar: '王', displayAsset: '<img src="../書法字體圖片/圖14.png"  alt="金文" style="max-height:100%;object-fit:contain;"/>' },
      { id: 15, fontType: '大篆',  displayChar: '龍', displayAsset: '<img src="../書法字體圖片/圖15.png"  alt="大篆" style="max-height:100%;object-fit:contain;"/>' },
      { id: 16, fontType: '甲骨文', displayChar: '山', displayAsset: '<img src="../書法字體圖片/圖16.png"  alt="甲骨文" style="max-height:100%;object-fit:contain;"/>' },
      { id: 17, fontType: '小篆',  displayChar: '天', displayAsset: '<img src="../書法字體圖片/圖17.png"  alt="小篆" style="max-height:100%;object-fit:contain;"/>' },
      { id: 18, fontType: '楷書',  displayChar: '和', displayAsset: '<img src="../書法字體圖片/圖18.png"  alt="楷書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 19, fontType: '行書',  displayChar: '和', displayAsset: '<img src="../書法字體圖片/圖19.png"  alt="行書" style="max-height:100%;object-fit:contain;"/>' },
      { id: 20, fontType: '草書',  displayChar: '和', displayAsset: '<img src="../書法字體圖片/圖20.png"  alt="草書" style="max-height:100%;object-fit:contain;"/>' }
    ];

    const FONT_TYPES = ['甲骨文', '金文', '大篆', '小篆', '隸書', '行書', '草書', '楷書'];
    const SPECIAL_MOLE_CHANCE = 0.3;
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmQYubeWScDAv2F5LNvKC1QZ0LRRo7BSdPp2K4JHoD5vCvIIP9yopHOYwBQCdvqR4fwDRynBVkyxJU/pub?output=csv';
    let randomQuestions = [];

    const FALLBACK_RANDOM_QUESTIONS = [
      { question: "下列哪一篇書法作品，有天下第一行書之稱？", options: ["蘭亭集序", "肚痛帖", "快雪時晴帖", "洛神賦十三行"] },
      { question: "自哪種字體之後，文字正式從圖畫變成方塊字？", options: ["隸書", "小篆", "大篆", "楷書"] },
      { question: "國文老師介紹書法作品時說：「這種字體筆畫連綴，運筆活潑，不像楷書那麼工整，也不像草書那麼潦草。」老師介紹的是哪種字體？", options: ["行書", "隸書", "籀文", "小篆"] },
      { question: "第一本字典《說文解字》內，收錄的文字是什麼字體？", options: ["小篆", "隸書", "行書", "籀文"] },
      { question: "請問《蘭亭集序》的作者是誰？", options: ["王羲之", "顏真卿", "柳公權", "王獻之"] },
      { question: "下列哪一位書法家，有「草聖」之稱？", options: ["張旭", "柳公權", "顏真卿", "歐陽詢"] },
      { question: "「目前發現最早已成系統的中國文字，筆畫纖細，多用直線、方筆且形似圖畫。」這是哪種文字的特徵？", options: ["甲骨文", "金文", "楷書", "小篆"] },
      { question: "「筆畫粗細一致，結構較簡單，秦統一天下後成為全國統一的字體。」這是哪種文字的特徵？", options: ["小篆", "甲骨文", "金文", "楷書"] },
      { question: "第一本研究甲骨文的書籍，是下列哪一本？", options: ["鐵雲藏龜", "說文解字", "世說新語", "契文舉例"] }
    ];

    function parseCSV(t) {
      const l = t.split('\n'), r = [];
      for (let i = 1; i < l.length; i++) {
        const ln = l[i].trim();
        if (!ln) continue;
        const c = [];
        let cc = '', q = false;
        for (let j = 0; j < ln.length; j++) {
          const ch = ln[j];
          if (ch == '"') {
            q = !q;
          } else if (ch == ',' && !q) {
            c.push(cc.trim());
            cc = '';
          } else {
            cc += ch;
          }
        }
        c.push(cc.trim());
        if (c.length >= 5) {
          const qt = c[0].replace(/^"|"$/g, '').trim().replace(/\s*[12],\s*[12]$/, '').replace(/\s*[12]$/, '');
          const opts = [c[1], c[2], c[3], c[4]].map(o => o.replace(/^"|"$/g, '').trim());
          r.push({ question: qt, options: opts });
        }
      }
      return r;
    }

    async function loadRandomQuestions() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error('x');
        const txt = await res.text();
        randomQuestions = parseCSV(txt);
        if (!randomQuestions.length) throw new Error('e');
        console.log('Random questions loaded successfully from Google Sheets.');
      } catch (e) {
        console.warn('Failed to fetch from Google Sheets, using fallback database:', e);
        randomQuestions = [...FALLBACK_RANDOM_QUESTIONS];
      }
    }

    loadRandomQuestions();

    const MAX_HP = 5;
    function getGameConfig() {
      if (score <= 150) {
        return { timeLimit: 10000, popInterval: 1500, scorePerHit: 10 };
      } else if (score <= 300) {
        return { timeLimit: 8000, popInterval: 1200, scorePerHit: 15 };
      } else if (score <= 500) {
        return { timeLimit: 6000, popInterval: 1000, scorePerHit: 20 };
      } else if (score <= 800) {
        return { timeLimit: 4500, popInterval: 800, scorePerHit: 30 };
      } else {
        return { timeLimit: 3000, popInterval: 600, scorePerHit: 50 };
      }
    }
    let score = 0, hp = MAX_HP, currentQuestion = null, timerInterval = null, timerStart = 0, isPlaying = false, moleSlots = [], audioCtx = null;
    let activeHoles = [], moleInterval = null;

    const $ = id => document.getElementById(id);
    const $grid = $("mole-grid"), $questionBox = $("question-display");
    const $scoreVal = $("score-val"), $hpHearts = $("hp-hearts"), $timerBar = $("timer-bar");
    const $startScreen = $("start-screen"), $endScreen = $("end-screen"), $finalScore = $("final-score-val");

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(f, d, t = 'square') {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = t; o.frequency.value = f;
      g.gain.setValueAtTime(.12, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + d);
    }

    function sfxCorrect() {
      playTone(523, .1, 'sine');
      setTimeout(() => playTone(659, .1, 'sine'), 80);
      setTimeout(() => playTone(784, .18, 'sine'), 160);
    }

    function sfxWrong() {
      playTone(200, .2, 'sawtooth');
      setTimeout(() => playTone(160, .3, 'sawtooth'), 120);
    }

    function renderHP() {
      let s = '';
      for (let i = 0; i < MAX_HP; i++)
        s += '<span class="heart' + (i >= hp ? ' lost' : '') + '">❤️</span>';
      $hpHearts.innerHTML = s;
    }

    function renderScore() {
      $scoreVal.textContent = score;
    }

    function buildGrid() {
      $grid.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const h = document.createElement('div');
        h.className = 'mole-hole';
        h.id = 'hole-' + i;
        h.innerHTML = '<button class="mole-btn" data-index="' + i + '" aria-label="地鼠"><div class="mole-body"><span class="mole-eyes">👀</span><span class="mole-label"></span></div></button>';
        $grid.appendChild(h);
      }
      $grid.querySelectorAll('.mole-btn').forEach(b => b.addEventListener('click', onMoleClick));
    }

    function pickQuestion() {
      return QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    }

    function shuffle(a) {
      const r = [...a];
      for (let i = r.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [r[i], r[j]] = [r[j], r[i]];
      }
      return r;
    }

    function generateMoleSlots(t) {
      const o = FONT_TYPES.filter(f => f !== t);
      const e = o[Math.floor(Math.random() * o.length)];
      return shuffle([...o, e, t]);
    }

        function startMolePopping() {
      stopMolePopping();
      popupSet(true);
      const config = getGameConfig();
      moleInterval = setInterval(() => {
        popupSet(false);
      }, config.popInterval);
    }

    function stopMolePopping() {
      clearInterval(moleInterval);
      $grid.querySelectorAll('.mole-hole').forEach(h => h.classList.remove('active'));
    }

    function popupSet(guaranteeCorrect) {
      const holes = $grid.querySelectorAll('.mole-hole');
      holes.forEach(h => h.classList.remove('active'));
      const correctIndex = moleSlots.indexOf(currentQuestion.fontType);
      const count = Math.floor(Math.random() * 2) + 2;
      let selected = [];
      if (guaranteeCorrect && correctIndex !== -1) {
        selected.push(correctIndex);
      }
      while (selected.length < count) {
        const rand = Math.floor(Math.random() * 9);
        if (!selected.includes(rand)) {
          selected.push(rand);
        }
      }
      selected = shuffle(selected);
      setTimeout(() => {
        selected.forEach((idx, iSelected) => {
          setTimeout(() => {
            if (isPlaying && $('question-overlay').classList.contains('hidden')) {
              holes[idx].classList.add('active');
            }
          }, iSelected * 50);
        });
      }, 200);
    }

    function showQuestion() {
      if (!isPlaying) return;
      currentQuestion = pickQuestion();
      moleSlots = generateMoleSlots(currentQuestion.fontType);
      if (currentQuestion.displayAsset) {
        $questionBox.innerHTML = currentQuestion.displayAsset;
      } else {
        $questionBox.textContent = currentQuestion.displayChar;
      }
      
      const h = $grid.querySelectorAll('.mole-hole');
      h.forEach((e, i) => {
        e.classList.remove('active', 'hit-correct', 'hit-wrong', 'special-colored');
        e.querySelector('.mole-label').textContent = moleSlots[i];
      });
      const correctIdx = moleSlots.indexOf(currentQuestion.fontType);
      if (correctIdx !== -1 && Math.random() < SPECIAL_MOLE_CHANCE) {
        h[correctIdx].classList.add('special-colored');
      }
      startMolePopping();
      startTimer();
    }

        function startTimer() {
      clearInterval(timerInterval);
      timerStart = Date.now();
      $timerBar.style.width = '100%';
      $timerBar.className = '';
      const config = getGameConfig();
      const limit = config.timeLimit;
      timerInterval = setInterval(() => {
        const el = Date.now() - timerStart, pct = Math.max(0, 1 - el / limit) * 100;
        $timerBar.style.width = pct + '%';
        $timerBar.className = pct < 30 ? 'danger' : pct < 60 ? 'warn' : '';
        if (el >= limit) {
          clearInterval(timerInterval);
          onTimeUp();
        }
      }, 30);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function triggerRandomQuestion(x, y) {
      if (randomQuestions.length === 0) {
        randomQuestions = [...FALLBACK_RANDOM_QUESTIONS];
      }
      const rq = randomQuestions[Math.floor(Math.random() * randomQuestions.length)];
      $('q-overlay-question').textContent = rq.question;
      const shuffledOpts = shuffle(rq.options.map((opt, idx) => ({ text: opt, isCorrect: idx === 0 })));
      const container = $('q-overlay-options');
      container.innerHTML = '';
      shuffledOpts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn-option';
        btn.textContent = opt.text;
        btn.addEventListener('click', () => {
          $('question-overlay').classList.add('hidden');
                    if (opt.isCorrect) {
            const config = getGameConfig();
            const earned = config.scorePerHit * 2;
            score += earned;
            renderScore();
            sfxCorrect();
            showFloatTextAt(x, y, '+' + earned + ' ✓', 'correct');
            setTimeout(nextRound, 450);
          } else {
            hp--;
            renderHP();
            sfxWrong();
            showFloatTextAt(x, y, '正確：' + rq.options[0], 'wrong');
            if (hp <= 0) setTimeout(endGame, 550);
            else setTimeout(nextRound, 700);
          }
        });
        container.appendChild(btn);
      });
      $('question-overlay').classList.remove('hidden');
    }

        function onMoleClick(e) {
      if (!isPlaying || !currentQuestion) return;
      const b = e.currentTarget, idx = parseInt(b.dataset.index), chosen = moleSlots[idx], hole = b.closest('\.mole-hole');
      if (!hole.classList.contains('active')) return;
      stopTimer();
      stopMolePopping();
      if (chosen === currentQuestion.fontType) {
        const isSpecial = hole.classList.contains('special-colored');
        if (isSpecial && randomQuestions.length > 0) {
          const r = b.getBoundingClientRect();
          triggerRandomQuestion(r.left + r.width / 2, r.top);
                } else {
          const config = getGameConfig();
          score += config.scorePerHit;
          renderScore();
          sfxCorrect();
          hole.classList.add('hit-correct');
          showFloatText(e, '+' + config.scorePerHit + ' ✓', 'correct');
          setTimeout(nextRound, 450);
        }
      } else {
        hp--;
        renderHP();
        sfxWrong();
        hole.classList.add('hit-wrong');
        showFloatText(e, '正確：' + currentQuestion.fontType, 'wrong');
        if (hp <= 0) setTimeout(endGame, 550);
        else setTimeout(nextRound, 700);
      }
    }

    function onTimeUp() {
      if (!isPlaying) return;
      stopMolePopping();
      sfxWrong();
      showFloatTextAt(window.innerWidth / 2, window.innerHeight / 2, '⏱ 時間到！正確：' + currentQuestion.fontType, 'wrong');
      setTimeout(nextRound, 1000);
    }

    function nextRound() {
      $grid.querySelectorAll('.mole-hole').forEach(h => h.classList.remove('active', 'hit-correct', 'hit-wrong', 'special-colored'));
      setTimeout(showQuestion, 300);
    }

    function showFloatText(e, txt, type) {
      const r = e.currentTarget.getBoundingClientRect();
      showFloatTextAt(r.left + r.width / 2, r.top, txt, type);
    }

    function showFloatTextAt(x, y, txt, type) {
      const el = document.createElement('div');
      el.className = 'float-text ' + type;
      el.textContent = txt;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.transform = 'translateX(-50%)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function startGame() {
      initAudio();
      score = 0; hp = MAX_HP; isPlaying = true;
      renderScore(); renderHP();
      $startScreen.classList.add('hidden');
      $endScreen.classList.add('hidden');
      $('question-overlay').classList.add('hidden');
      buildGrid();
      showQuestion();
    }

        function endGame() {
      isPlaying = false;
      stopTimer();
      stopMolePopping();

      // Calculate Rank
      let rank = '';
      let rankDesc = '';
      if (score <= 300) {
        rank = '不入流';
        rankDesc = '你還是小菜菜，再多練練吧！';
      } else if (score <= 500) {
        rank = '二流高手';
        rankDesc = '小有實力，可惜還不到火候！';
      } else if (score <= 800) {
        rank = '一流高手';
        rankDesc = '頗有實力，距離武林盟主只剩一步！';
      } else {
        rank = '武林高手';
        rankDesc = '實在太厲害了～容我稱你一聲大師！';
      }
      if (rank !== '不入流') {
        localStorage.setItem('cert_whack_a_mole', '書法之印');
      } else {
        localStorage.removeItem('cert_whack_a_mole');
      }
      localStorage.setItem('score_whack_a_mole', score);

      // Update Rank Seal elements
      const sealCircle = $('rank-seal-circle');
      sealCircle.classList.remove('animate');
      void sealCircle.offsetWidth; // force reflow
      $('rank-seal-text').textContent = rank;
      $('rank-seal-desc').textContent = rankDesc;
      setTimeout(() => sealCircle.classList.add('animate'), 300);

      $endScreen.classList.remove('hidden');
      $finalScore.textContent = score;
      $grid.querySelectorAll('\.mole-hole').forEach(h => h.classList.remove('active'));
    }

    $("btn-start").addEventListener("click", startGame);
    $("btn-restart").addEventListener("click", startGame);
    renderHP();
  </script>
</body>
